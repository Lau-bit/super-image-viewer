<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self' asset: http://asset.localhost;
             style-src 'self' 'unsafe-inline';
             script-src 'self';
             img-src 'self' data: asset: http://asset.localhost blob:;">
  <title>Super Image Viewer</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="no-folder app-starting">

  <!-- Custom slim title bar -->
  <div id="titlebar">
    <div id="titlebar-drag">
      <span id="titlebar-title">Super Image Viewer</span>
    </div>
    <div id="titlebar-controls">
      <button id="btn-settings" title="Settings">&#x2699;</button>
      <button id="btn-minimize" title="Minimize">&#x2212;</button>
      <button id="btn-close" title="Close">&#x2715;</button>
    </div>
  </div>

  <!-- Toolbar -->
  <div id="toolbar">
    <div id="folder-wrapper">
      <button id="btn-folder" title="Open / manage image sources" aria-label="Open / manage image sources">
        <svg class="control-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M3.75 6.75h6.1l1.8 2.1h8.6v8.4a2 2 0 0 1-2 2H5.75a2 2 0 0 1-2-2V6.75Z"></path>
          <path d="M3.75 9.25h16.5"></path>
        </svg>
        <span id="folder-button-label">Folder</span>
      </button>
      <div id="folder-panel">
        <div id="folder-mode-tabs">
          <button type="button" class="folder-mode-tab active" data-browse-mode="multi">Folders</button>
          <button type="button" class="folder-mode-tab" data-browse-mode="categorized">Categorized</button>
        </div>
        <div class="folder-panel-group">
          <div class="folder-panel-title">Startup</div>
          <label class="folder-panel-option">
            <span>Mode</span>
            <select id="setting-startup-browse-mode" class="settings-select">
              <option value="multi">Folders</option>
              <option value="categorized">Categorized</option>
            </select>
          </label>
          <button type="button" class="folder-panel-btn" id="setting-use-current-source">Use current source at startup</button>
          <div id="setting-startup-source-name" class="settings-source-summary">None</div>
        </div>
        <div class="folder-panel-group">
          <div class="folder-panel-title">Startup Slideshow</div>
          <label class="folder-panel-option">
            <span>Source</span>
            <select id="setting-auto-slideshow-source" class="settings-select">
              <option value="folders">Folders</option>
              <option value="categorized">Categorized</option>
            </select>
          </label>
          <button type="button" class="folder-panel-btn" id="setting-auto-slideshow-folder-needed" hidden>Set slideshow startup folder</button>
        </div>
        <div id="folder-loading" hidden>
          <span class="folder-loading-spinner" aria-hidden="true"></span>
          <span id="folder-loading-text">Loading...</span>
        </div>
        <div id="folder-section-multi" class="folder-section visible">
          <button type="button" class="folder-panel-btn" id="folder-multi-add">Add Folder</button>
          <div id="multi-folder-list"></div>
        </div>
        <div id="folder-section-categorized" class="folder-section">
          <div id="categorized-root-row">
            <span id="categorized-root-name">No root chosen</span>
            <button type="button" class="folder-panel-btn" id="categorized-root-choose">Choose</button>
          </div>
          <div id="categories-panel-bulk">
            <button type="button" id="categories-select-all">All</button>
            <button type="button" id="categories-select-none">None</button>
            <button type="button" id="categories-rescan" title="Rescan categorized root">&#x21BB;</button>
          </div>
          <div id="categories-list"></div>
        </div>
      </div>
    </div>
    <span id="folder-name" class="folder-name"></span>

    <!-- Image count -->
    <div class="stepper-control" title="Images per set (4&#x2013;99)">
      <button id="btn-count-dec" title="Fewer images">&#x2212;</button>
      <span id="count-display">9</span>
      <button id="btn-count-inc" title="More images">+</button>
    </div>

    <!-- Empty slots -->
    <div class="stepper-control" title="Empty slots for breathing room">
      <span class="stepper-label">&#x25A2;</span>
      <button id="btn-empty-dec" title="Fewer empty slots">&#x2212;</button>
      <span id="empty-display">0</span>
      <button id="btn-empty-inc" title="More empty slots">+</button>
    </div>

    <!-- Display mode -->
    <div id="mode-buttons">
      <button id="btn-mode-random" class="mode-btn active" title="Random images">Random</button>
      <button id="btn-mode-chrono" class="mode-btn"        title="Recent images by date">Recent</button>
    </div>

    <!-- Fill/crop controls -->
    <div id="zoom-fill-controls">
      <button id="btn-zoom-fill" class="toggle-btn" title="Toggle zoom to fill">Fill</button>
      <button id="btn-zoom-level-1" class="zoom-level-btn active" title="Zoom to fill level 1">Z1</button>
      <button id="btn-zoom-level-2" class="zoom-level-btn" title="Zoom to fill level 2">Z2</button>
      <button id="btn-zoom-level-3" class="zoom-level-btn" title="Zoom to fill level 3">Z3</button>
      <input id="zoom-fill-slider" type="range" min="0" max="100" step="1" value="30" title="Zoom to fill amount">
      <div id="zoom-bias-control" title="Nudge zoom-to-fill centering">
        <button id="btn-bias-left" data-bias-direction="L" title="Bias left">L</button>
        <div class="zoom-bias-middle">
          <button id="btn-bias-up" data-bias-direction="U" title="Bias up">U</button>
          <span id="zoom-bias-display" title="Reset bias"><span id="zoom-bias-letter"></span><span id="zoom-bias-value">0</span></span>
          <button id="btn-bias-down" data-bias-direction="D" title="Bias down">D</button>
        </div>
        <button id="btn-bias-right" data-bias-direction="R" title="Bias right">R</button>
      </div>
    </div>

    <!-- Slideshow -->
    <button id="btn-slideshow" class="toggle-btn" title="Slideshow &#x2014; auto-advance sets">&#x23F5;</button>

    <!-- Shuffle current set -->
    <button id="btn-shuffle" title="Shuffle current set">&#x21C4;</button>

    <!-- New random set -->
    <button id="btn-refresh" title="New set (Space)">&#x21BA;</button>

    <!-- History navigation -->
    <div id="nav-buttons">
      <button id="btn-nav-prev" title="Previous set (&#x2190;)" disabled>&#x25C4;</button>
      <button id="btn-nav-next" title="Next set (&#x2192;)">&#x25BA;</button>
    </div>
  </div>

  <!-- Startup/loading overlay -->
  <div id="startup-loading-overlay" aria-live="polite">
    <span id="startup-loading-spinner" aria-hidden="true"></span>
    <span>Loading...</span>
  </div>

  <!-- Image grid (populated by JS) -->
  <div id="image-grid"></div>

  <!-- Empty state shown until a folder is selected -->
  <div id="empty-state">
    <div id="empty-icon">&#x1F5BC;</div>
    <p>Add a folder to display images</p>
    <button id="btn-open-empty">Add Folder</button>
  </div>

  <!-- Settings panel -->
  <div id="settings-panel">
    <div class="settings-title">Settings</div>

    <div class="settings-section-title">Window</div>
    <button type="button" class="settings-btn" id="setting-save-first-window">Save as 1st window default</button>
    <button type="button" class="settings-btn" id="setting-reset-first-window">Reset 1st window default</button>
    <button type="button" class="settings-btn" id="setting-save-secondary-window">Save as 2nd+ window default</button>
    <button type="button" class="settings-btn" id="setting-reset-secondary-window">Reset 2nd+ window default</button>
    <label class="settings-option">
      <input type="checkbox" id="setting-square-app-corners">
      <span>Square app outer corners</span>
    </label>

    <div class="settings-section-title">Images (4&#x2013;99)</div>
    <label class="settings-option">
      <span class="settings-label">Count</span>
      <input type="range" id="setting-count-slider" min="4" max="99" step="1" value="9">
      <span id="setting-count-value" class="settings-value">9</span>
    </label>

    <div class="settings-section-title">Categorized</div>
    <label class="settings-option" title="When you categorize an image into a category that isn't currently shown, hide it immediately and pull in a replacement">
      <input type="checkbox" id="setting-instant-filter">
      <span>Instant filter on categorize</span>
    </label>

    <div class="settings-section-title">Slideshow</div>
    <label class="settings-option">
      <input type="checkbox" id="setting-auto-hide-ui">
      <span>Autohide UI on startup</span>
    </label>
    <label class="settings-option">
      <input type="checkbox" id="setting-first-auto-open-slideshow">
      <span>Auto-slideshow 1st window</span>
    </label>
    <label class="settings-option">
      <input type="checkbox" id="setting-secondary-auto-open-slideshow">
      <span>Auto-slideshow 2nd window</span>
    </label>
    <label class="settings-option">
      <span class="settings-label">Interval (sec)</span>
      <input type="number" id="setting-slideshow-duration" min="1" max="3600" value="5">
    </label>
  </div>

  <!-- Right-click categorize menu (categorized mode); populated by JS -->
  <div id="grid-context-menu" class="context-menu"></div>

  <script src="api.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
